version: '3.9'

services:

  db-alertas:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ms_alertas_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata_alertas:/var/lib/postgresql/data
    ports:
      - "5435:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  ms-alertas:
    build: .
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8003"
    volumes:
      - .:/app
    ports:
      - "8003:8003"
    env_file:
      - .env
    environment:
      DB_HOST: db-alertas
      DB_PORT: 5432
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db-alertas:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Worker de Celery — procesa tareas en segundo plano
  celery-worker:
    build: .
    command: celery -A core worker --loglevel=info
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      DB_HOST: db-alertas
      DB_PORT: 5432
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - ms-alertas
      - redis

  # Celery Beat — dispara tareas periódicas (cada hora)
  celery-beat:
    build: .
    command: celery -A core beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      DB_HOST: db-alertas
      DB_PORT: 5432
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - ms-alertas
      - redis

volumes:
  pgdata_alertas:
